<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Registry Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-tertiary: #1a2235;
    --bg-hover: #1e293b;
    --border: #2a3550;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --gold: #f59e0b; --gold-dim: #92610a;
    --blue: #3b82f6; --blue-dim: #1e3a6e;
    --teal: #14b8a6; --teal-dim: #0a5c53;
    --green: #22c55e; --green-dim: #126e33;
    --purple: #a855f7; --purple-dim: #5b2d8e;
    --rose: #f43f5e; --rose-dim: #7e1d2e;
    --cyan: #06b6d4;
    --link-color: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); z-index: 10; position: relative; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--gold), var(--blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; }
  .logo h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo h1 span { color: var(--text-muted); font-weight: 400; }
  .header-controls { display: flex; align-items: center; gap: 8px; }
  .view-tabs { display: flex; background: var(--bg-tertiary); border-radius: 8px; padding: 3px; gap: 2px; }
  .view-tab { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .view-tab:hover { color: var(--text-primary); }
  .view-tab.active { background: var(--blue); color: #fff; }
  .search-box { position: relative; margin-left: 12px; }
  .search-box input { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px 7px 34px; color: var(--text-primary); font-family: inherit; font-size: 13px; width: 240px; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--blue); }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .search-results { position: absolute; top: 100%; right: 0; margin-top: 4px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; width: 320px; max-height: 360px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .search-results.visible { display: block; }
  .search-result-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg-hover); }
  .search-result-item .sr-name { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
  .search-result-item .sr-path { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .breadcrumb { display: flex; align-items: center; gap: 4px; padding: 8px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); font-size: 12px; min-height: 36px; }
  .breadcrumb-item { color: var(--text-muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; white-space: nowrap; }
  .breadcrumb-item:hover { color: var(--text-primary); background: var(--bg-hover); }
  .breadcrumb-item.current { color: var(--text-primary); cursor: default; }
  .breadcrumb-item.current:hover { background: transparent; }
  .breadcrumb-sep { color: var(--text-muted); opacity: 0.5; }
  .main-container { display: flex; height: calc(100vh - 96px); position: relative; }
  .tree-pane { flex: 1; position: relative; overflow: hidden; }
  .tree-pane svg { width: 100%; height: 100%; }
  .detail-panel { width: 420px; min-width: 420px; background: var(--bg-secondary); border-left: 1px solid var(--border); overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
  .detail-header { padding: 20px; border-bottom: 1px solid var(--border); }
  .detail-header .type-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .badge-coordinator { background: var(--gold-dim); color: var(--gold); }
  .badge-orchestrator { background: var(--blue-dim); color: var(--blue); }
  .badge-agent { background: var(--teal-dim); color: var(--teal); }
  .badge-skill { background: var(--green-dim); color: var(--green); }
  .badge-root { background: var(--blue-dim); color: var(--cyan); }
  .detail-header h2 { font-size: 18px; font-weight: 600; line-height: 1.3; }
  .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .detail-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); cursor: pointer; border: none; background: transparent; font-family: inherit; transition: all 0.2s; border-bottom: 2px solid transparent; }
  .detail-tab:hover { color: var(--text-secondary); }
  .detail-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .detail-content { flex: 1; overflow-y: auto; }
  .detail-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .detail-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
  .detail-section p, .detail-section li { font-size: 13px; line-height: 1.6; color: var(--text-secondary); }
  .detail-section ul { list-style: none; padding: 0; }
  .detail-section ul li { padding: 4px 0; padding-left: 16px; position: relative; }
  .detail-section ul li::before { content: ''; position: absolute; left: 0; top: 12px; width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
  .file-path { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--link-color); word-break: break-all; }
  .dispatches-list .dispatch-tag { display: inline-block; padding: 3px 8px; margin: 2px 4px 2px 0; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--teal); cursor: pointer; transition: background 0.15s; }
  .dispatches-list .dispatch-tag:hover { background: var(--bg-hover); }
  .phase-list { counter-reset: phase; }
  .phase-list li { counter-increment: phase; padding-left: 28px !important; }
  .phase-list li::before { content: counter(phase) !important; width: 18px !important; height: 18px !important; border-radius: 50% !important; background: var(--bg-tertiary) !important; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--text-secondary); position: absolute; left: 0; top: 5px; }

  .md-content { padding: 20px; font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
  .md-content h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .md-content h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); margin: 20px 0 10px; }
  .md-content h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 16px 0 8px; }
  .md-content h4 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 12px 0 6px; }
  .md-content p { margin: 8px 0; }
  .md-content ul, .md-content ol { margin: 8px 0; padding-left: 24px; }
  .md-content li { margin: 4px 0; list-style: disc; padding-left: 0; }
  .md-content li::before { display: none; }
  .md-content ol li { list-style: decimal; }
  .md-content code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg-tertiary); padding: 2px 5px; border-radius: 3px; color: var(--teal); }
  .md-content pre { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 12px 0; overflow-x: auto; }
  .md-content pre code { background: none; padding: 0; color: var(--text-secondary); font-size: 12px; line-height: 1.6; }
  .md-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
  .md-content th { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 600; }
  .md-content blockquote { border-left: 3px solid var(--blue); padding: 8px 16px; margin: 12px 0; color: var(--text-muted); background: var(--bg-tertiary); border-radius: 0 4px 4px 0; }
  .md-content strong { color: var(--text-primary); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .md-loading { padding: 40px; text-align: center; color: var(--text-muted); }

  .node-box { cursor: pointer; transition: opacity 0.2s; }
  .node-box:hover rect { filter: brightness(1.3); }
  .node-box text { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--text-primary); pointer-events: none; user-select: none; }
  .link-path { fill: none; stroke: var(--border); stroke-width: 1.5; opacity: 0.5; }
  .flow-container { width: 100%; height: 100%; display: none; overflow: auto; padding: 20px; }
  .flow-container.active { display: flex; align-items: center; justify-content: center; }
  .tree-pane svg.hidden { display: none; }
  .tooltip { position: absolute; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--text-secondary); max-width: 280px; pointer-events: none; z-index: 200; opacity: 0; transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-name { font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .placeholder-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; padding: 40px; gap: 12px; }
  .placeholder-msg .big-icon { font-size: 48px; opacity: 0.3; }
  .placeholder-msg p { font-size: 13px; line-height: 1.6; }
  .stats-bar { display: flex; gap: 16px; padding: 8px 24px; background: var(--bg-secondary); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; }
  .stats-bar .stat-item span { color: var(--text-secondary); font-weight: 500; }
</style>
</head>

const COLORS = {
  root:         { fill: '#06b6d4', stroke: '#0891b2' },
  coordinator:  { fill: '#f59e0b', stroke: '#d97706' },
  orchestrator: { fill: '#3b82f6', stroke: '#2563eb' },
  agent:        { fill: '#14b8a6', stroke: '#0d9488' },
  skill:        { fill: '#22c55e', stroke: '#16a34a' }
};

let currentRoot = null, navStack = [], selectedNode = null, treeSvg, treeG, zoomBehavior;
const nodeWidths = new Map();
const CHAR_W = 7.2, PAD_X = 16, PAD_Y = 6, BOX_R = 5;

function estimateWidth(name) { return name.length * CHAR_W + PAD_X * 2; }

function init() {
  currentRoot = d3.hierarchy(DATA);
  computeStats(currentRoot);
  setupTree();
  setupFlowView();
  setupEventListeners();
  renderTree(currentRoot);
}

function computeStats(root) {
  let agents = 0, skills = 0, total = 0;
  root.each(d => { total++; if (d.data.type === 'agent') agents++; if (d.data.type === 'skill') skills++; });
  document.getElementById('statAgents').textContent = agents;
  document.getElementById('statSkills').textContent = skills;
  document.getElementById('statTotal').textContent = total;
}

function setupTree() {
  const svg = d3.select('#treeSvg');
  zoomBehavior = d3.zoom().scaleExtent([0.15, 3]).on('zoom', e => treeG.attr('transform', e.transform));
  svg.call(zoomBehavior).on('dblclick.zoom', null);
  treeG = svg.append('g').attr('class', 'tree-group');
}

function collapseDeep(node, maxDepth, depth = 0) {
  if (!node.children) return;
  for (const c of node.children) collapseDeep(c, maxDepth, depth + 1);
  if (depth >= maxDepth && node.children) { node._children = node.children; node.children = null; node._expanded = false; }
  else node._expanded = true;
}

function renderTree(rootNode, animate = true) {
  collapseDeep(rootNode, 2);
  rootNode._expanded = true;
  updateTree(rootNode, animate);
}

function updateTree(rootNode, animate = true) {
  const container = document.getElementById('treePane');
  const cW = container.clientWidth, cH = container.clientHeight;
  const leaves = []; rootNode.eachBefore(d => { if (!d.children) leaves.push(d); });
  const dH = Math.max(cH - 40, leaves.length * 34);
  const treeLayout = d3.tree().size([dH, Math.max(cW - 500, 600)]).separation((a, b) => a.parent === b.parent ? 1 : 1.5);
  treeLayout(rootNode);
  const nodes = rootNode.descendants(), links = rootNode.links();

  nodes.forEach(d => { d._w = estimateWidth(d.data.name); d._h = 24; });

  const linkGen = d => {
    const sw = d.source._w || 100, sx = d.source.y + 60 + sw / 2, sy = d.source.x + 20;
    const tw = d.target._w || 100, tx = d.target.y + 60 - tw / 2, ty = d.target.x + 20;
    const mx = (sx + tx) / 2;
    return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
  };

  const linkSel = treeG.selectAll('.link-path').data(links, d => d.target.data.name + '|' + (d.target.parent?.data.name || ''));
  linkSel.exit().transition().duration(animate ? 300 : 0).attr('opacity', 0).remove();
  const linkE = linkSel.enter().append('path').attr('class', 'link-path').attr('opacity', 0);
  linkSel.merge(linkE).transition().duration(animate ? 500 : 0).attr('opacity', 0.5).attr('d', linkGen);

  const nodeSel = treeG.selectAll('.node-box').data(nodes, d => d.data.name + '|' + (d.parent?.data.name || ''));
  nodeSel.exit().transition().duration(animate ? 300 : 0).attr('opacity', 0).remove();

  const nodeE = nodeSel.enter().append('g').attr('class', 'node-box')
    .attr('transform', d => `translate(${d.y + 60},${d.x + 20})`).attr('opacity', 0);

  nodeE.append('rect')
    .attr('x', d => -d._w / 2).attr('y', d => -d._h / 2)
    .attr('width', d => d._w).attr('height', d => d._h)
    .attr('rx', BOX_R)
    .attr('fill', d => (COLORS[d.data.type]?.fill || '#555') + '25')
    .attr('stroke', d => COLORS[d.data.type]?.stroke || '#444')
    .attr('stroke-width', 1.5);

  nodeE.append('text').attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('font-weight', d => (d.data.type === 'coordinator' || d.data.type === 'orchestrator') ? '600' : '400')
    .text(d => d.data.name);

  nodeE.append('text').attr('class', 'collapse-badge')
    .attr('x', d => d._w / 2 - 6).attr('y', -4)
    .attr('text-anchor', 'middle').attr('font-size', '9px').attr('fill', 'var(--text-muted)').text('');

  const merged = nodeSel.merge(nodeE);
  merged.transition().duration(animate ? 500 : 0)
    .attr('transform', d => `translate(${d.y + 60},${d.x + 20})`).attr('opacity', 1);

  merged.select('rect')
    .attr('x', d => -d._w / 2).attr('width', d => d._w)
    .attr('fill', d => d === selectedNode ? (COLORS[d.data.type]?.fill || '#555') + '55' : (COLORS[d.data.type]?.fill || '#555') + '25')
    .attr('stroke', d => d === selectedNode ? '#fff' : (COLORS[d.data.type]?.stroke || '#444'))
    .attr('stroke-width', d => d === selectedNode ? 2 : 1.5);

  merged.select('.collapse-badge').text(d => d._children ? `+${d._children.length}` : '');

  merged.on('click', (ev, d) => {
    ev.stopPropagation();
    if (d.children) { d._children = d.children; d.children = null; d._expanded = false; }
    else if (d._children) { d.children = d._children; d._children = null; d._expanded = true; }
    selectNode(d); updateTree(currentRoot);
  }).on('dblclick', (ev, d) => {
    ev.stopPropagation();
    if (d.data.children?.length) drillDown(d);
  }).on('mouseenter', (ev, d) => showTooltip(ev, d.data)).on('mouseleave', hideTooltip);

  if (animate && nodes.length > 0) {
    const xE = d3.extent(nodes, d => d.x), yE = d3.extent(nodes, d => d.y);
    const tH = (xE[1] - xE[0]) + 80, tW = (yE[1] - yE[0]) + 300;
    const sc = Math.min((cW - 40) / tW, (cH - 40) / tH, 1.4);
    const svg = d3.select('#treeSvg');
    svg.transition().duration(500).call(zoomBehavior.transform,
      d3.zoomIdentity.translate(cW / 2 - (d3.mean(yE) + 60) * sc, cH / 2 - (d3.mean(xE) + 20) * sc).scale(sc));
  }
}

function drillDown(node) {
  navStack.push({ root: currentRoot, selected: selectedNode });
  currentRoot = d3.hierarchy(node.data);
  selectedNode = null;
  currentRoot._expanded = true;
  if (currentRoot.children) currentRoot.children.forEach(c => { c._expanded = true; });
  updateBreadcrumb(); renderTree(currentRoot); selectNode(currentRoot);
}

function drillUp(idx) {
  if (idx < 0 || idx >= navStack.length) return;
  const t = navStack[idx]; navStack = navStack.slice(0, idx);
  currentRoot = t.root; selectedNode = null;
  updateBreadcrumb(); renderTree(currentRoot);
}

function selectNode(node) {
  selectedNode = node;
  renderDetailPanel(node.data);
  updateTree(currentRoot, false);
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb'); bc.innerHTML = '';
  const r = document.createElement('span');
  r.className = 'breadcrumb-item' + (navStack.length === 0 ? ' current' : '');
  r.textContent = 'SDLC System';
  r.onclick = () => { if (navStack.length > 0) drillUp(0); };
  bc.appendChild(r);
  navStack.forEach((e, i) => {
    bc.appendChild(Object.assign(document.createElement('span'), { className: 'breadcrumb-sep', textContent: '›' }));
    const it = document.createElement('span');
    it.className = 'breadcrumb-item';
    const nm = navStack[i + 1] ? navStack[i + 1].root.data.name : currentRoot.data.name;
    it.textContent = nm; it.onclick = () => drillUp(i + 1); bc.appendChild(it);
  });
  if (navStack.length > 0) {
    bc.appendChild(Object.assign(document.createElement('span'), { className: 'breadcrumb-sep', textContent: '›' }));
    bc.appendChild(Object.assign(document.createElement('span'), { className: 'breadcrumb-item current', textContent: currentRoot.data.name }));
  }
}

function renderDetailPanel(data) {

    </div>
    <div class="detail-content" id="detailContent"></div>`;
  panel.querySelectorAll('.detail-tab').forEach(t => t.addEventListener('click', () => {
    activeDetailTab = t.dataset.tab;
    panel.querySelectorAll('.detail-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === activeDetailTab));
    renderDetailContent(data);
  }));

function renderDetailContent(data) {
  const el = document.getElementById('detailContent');
  if (activeDetailTab === 'summary') {
    let h = '';
    if (data.summary) h += `<div class="detail-section"><h3>Summary</h3><p>${data.summary}</p></div>`;
    if (data.phases?.length) h += `<div class="detail-section"><h3>Phases</h3><ul class="phase-list">${data.phases.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
    if (data.dispatches?.length) h += `<div class="detail-section"><h3>Dispatches</h3><div class="dispatches-list">${data.dispatches.map(d => `<span class="dispatch-tag" onclick="navigateToNode('${d}')">${d}</span>`).join('')}</div></div>`;
    if (data.children?.length) {
      const skills = data.children.filter(c => c.type === 'skill');
      const agents = data.children.filter(c => c.type !== 'skill');
      if (skills.length) h += `<div class="detail-section"><h3>Skills</h3><div class="dispatches-list">${skills.map(s => `<span class="dispatch-tag" style="color:var(--green)" onclick="navigateToNode('${s.name}')">${s.name}</span>`).join('')}</div></div>`;
      if (agents.length) h += `<div class="detail-section"><h3>Children (${agents.length})</h3><ul>${agents.map(c => `<li><strong>${c.name}</strong> <span style="color:${COLORS[c.type]?.fill || '#666'}">[${c.type}]</span></li>`).join('')}</ul></div>`;
    }
    if (data.filePath) h += `<div class="detail-section"><h3>Source File</h3><div class="file-path">${data.filePath}</div></div>`;
    el.innerHTML = h;
  } else {
    if (!data.filePath) { el.innerHTML = '<div class="md-loading">No source file available.</div>'; return; }
    if (mdCache[data.filePath]) { el.innerHTML = `<div class="md-content">${marked.parse(mdCache[data.filePath])}</div>`; return; }
    el.innerHTML = '<div class="md-loading">Loading file...</div>';
    const basePath = window.location.pathname.replace(/\/dashboard\/.*$/, '/');
    fetch(basePath + data.filePath)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(txt => {
        let content = txt;
        if (content.startsWith('---')) { const end = content.indexOf('---', 3); if (end > 0) content = content.slice(end + 3).trim(); }
        mdCache[data.filePath] = content;
        el.innerHTML = `<div class="md-content">${marked.parse(content)}</div>`;
      })
      .catch(() => { el.innerHTML = `<div class="md-loading">Could not load file. Serve from repo root:<br><code>cd ai-registry && python3 -m http.server 8765</code></div>`; });
  }
}

function findNodeByName(data, name) {
  const n = name.toLowerCase().replace(/\s+/g, ' ');
  if (data.name.toLowerCase().includes(n) || n.includes(data.name.toLowerCase())) return data;
  if (data.children) for (const c of data.children) { const f = findNodeByName(c, name); if (f) return f; }
  return null;
}

function flattenTree(node, path = []) {
  const r = [{ data: node, path: [...path, node.name] }];
  if (node.children) for (const c of node.children) r.push(...flattenTree(c, [...path, node.name]));
  return r;
}

  const all = flattenTree(DATA);
  si.addEventListener('input', () => {
    const q = si.value.toLowerCase().trim();

    const m = all.filter(n => n.data.name.toLowerCase().includes(q) || (n.data.summary?.toLowerCase().includes(q))).slice(0, 12);
    if (!m.length) { sr.classList.remove('visible'); return; }
    sr.innerHTML = m.map(x => `<div class="search-result-item" data-name="${x.data.name}"><div class="sr-name" style="color:${COLORS[x.data.type]?.fill || '#ccc'}">${x.data.name}</div><div class="sr-path">${x.path.join(' › ')}</div></div>`).join('');
    sr.classList.add('visible');
    sr.querySelectorAll('.search-result-item').forEach(it => it.addEventListener('click', () => { navigateToNode(it.dataset.name); sr.classList.remove('visible'); si.value = ''; }));
  });
  si.addEventListener('blur', () => setTimeout(() => sr.classList.remove('visible'), 200));
  si.addEventListener('keydown', e => { if (e.key === 'Escape') { sr.classList.remove('visible'); si.blur(); } });
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== si) { e.preventDefault(); si.focus(); }
    if (e.key === 'Escape' && navStack.length > 0) drillUp(navStack.length - 1);
  });
}

function navigateToNode(name) {
  switchView('tree');
  while (navStack.length > 0) drillUp(0);
  currentRoot = d3.hierarchy(DATA);
  function expandTo(nd, target) {
    if (nd.data.name === target) return true;
    const ch = nd.children || nd._children;
    if (ch) { if (nd._children) { nd.children = nd._children; nd._children = null; } nd._expanded = true;
      for (const c of nd.children) if (expandTo(c, target)) return true; }
    return false;
  }
  expandTo(currentRoot, name);
  updateTree(currentRoot);
  let found = null; currentRoot.each(d => { if (d.data.name === name) found = d; });
  if (found) selectNode(found);
}

function switchView(view) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.view-tab[data-view="${view}"]`).classList.add('active');
  const ts = document.getElementById('treeSvg'), fc = document.getElementById('flowContainer'), dp = document.getElementById('detailPanel');
  if (view === 'tree') { ts.classList.remove('hidden'); fc.classList.remove('active'); dp.style.display = ''; if (currentRoot) updateTree(currentRoot, false); }
  else { ts.classList.add('hidden'); fc.classList.add('active'); dp.style.display = 'none'; }
}

window.addEventListener('resize', () => { if (currentRoot) updateTree(currentRoot, false); });
window.addEventListener('hashchange', () => {
  const h = decodeURIComponent(location.hash.slice(1));
  if (h) navigateToNode(h);
});
init();
if (location.hash) { const h = decodeURIComponent(location.hash.slice(1)); if (h) setTimeout(() => navigateToNode(h), 100); }
</script>
